name: AIOS CI/CD

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 1 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "20 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: aios-pages
  cancel-in-progress: false

jobs:
  test-generate-and-deploy:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Generate AIOS reports
        env:
          AIOS_TEST_RESULT: passed
          AIOS_DEPLOYMENT_STATUS: generated
        run: |
          python main.py --provider csv --output-dir reports --no-input

      - name: Validate generated reports
        run: |
          test -f reports/latest_signal.json
          test -f reports/investment_dashboard.xlsx
          test -f reports/dashboard.html
          test -f reports/history.csv
          test -f reports/execution.log
          test -f reports/deployment_summary.txt

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/latest_signal.json \
            reports/investment_dashboard.xlsx \
            reports/dashboard.html \
            reports/history.csv \
            reports/execution.log \
            reports/deployment_summary.txt
          git diff --cached --quiet || git commit -m "chore: update generated AIOS reports [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p pages
          cp reports/dashboard.html pages/index.html
          cp reports/dashboard.html pages/dashboard.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
