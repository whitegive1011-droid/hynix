name: Manual Daily Prices
description: Submit manual daily prices from mobile when live providers are unavailable.
title: "Manual Prices YYYY-MM-DD"
labels: ["manual-prices"]
body:
  - type: input
    id: trading_date
    attributes:
      label: Trading date
      description: Use the market trading date in YYYY-MM-DD format.
      placeholder: "2026-06-27"
    validations:
      required: true
  - type: textarea
    id: price_csv
    attributes:
      label: Price CSV
      description: "Paste the CSV header and one row per ticker. Official sources: futu_official, ibkr_official, manual_official, yahoo, stooq. Proxy sources: binance_proxy, okx_proxy."
      render: csv
      value: |
        date,ticker,close,change_pct,market_cap,source,note
        2026-06-27,AAPL,201.00,1.25,,futu_official,"Official equity close"
        2026-06-27,MSFT,510.50,0.80,,ibkr_official,"Official equity close"
        2026-06-27,000660.KS,272400,-2.10,,manual_official,"Official KR equity close"
        2026-06-27,MU,115.50,-4.80,,yahoo,"Official equity close"
        2026-06-27,AAPL,281.38,1.88,,binance_proxy,"AAPLUSDT tradable proxy, not official equity data"
        2026-06-27,MU,1138.19,-1.55,,binance_proxy,"MUUSDT tradable proxy, not official equity data"
    validations:
      required: true
  - type: textarea
    id: market_notes
    attributes:
      label: Optional market notes
      description: Add any context you want preserved with this issue.
      placeholder: "Market was volatile after..."
    validations:
      required: false
