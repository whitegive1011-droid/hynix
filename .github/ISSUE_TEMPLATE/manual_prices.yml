name: Manual Daily Prices
description: Submit manual daily prices from mobile when live providers are unavailable.
title: "Manual Prices YYYY-MM-DD"
labels: ["manual-prices"]
body:
  - type: input
    id: trading_date
    attributes:
      label: Trading date
      description: Use the market trading date in YYYY-MM-DD format.
      placeholder: "2026-06-27"
    validations:
      required: true
  - type: textarea
    id: price_csv
    attributes:
      label: Price CSV
      description: "Paste the CSV header and one row per ticker. Any source value is accepted and normalized to manual_upload. Examples: futu, binance, okx, futu_official, binance_proxy."
      render: csv
      value: |
        date,ticker,close,change_pct,market_cap,source,note
        2026-06-27,AAPL,281.38,1.88,,binance,"AAPLUSDT manual price"
        2026-06-27,MSFT,374.68,4.99,,futu,"Manual price"
        2026-06-27,000660.KS,1762.51,-0.12,,okx,"SK Hynix manual price"
        2026-06-27,MU,1138.19,-1.55,,binance_proxy,"Accepted as manual upload"
    validations:
      required: true
  - type: textarea
    id: market_notes
    attributes:
      label: Optional market notes
      description: Add any context you want preserved with this issue.
      placeholder: "Market was volatile after..."
    validations:
      required: false
